<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback — Rowell Family Reunion</title>
    <style>
        /* Reset and base */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #2C2C2C;
            line-height: 1.6;
            background-color: #FAF3E0;
        }

        h1, h2, h3, h4 {
            font-family: Georgia, "Times New Roman", serif;
        }

        /* Navigation */
        .site-nav {
            background-color: #7B2D42;
            padding: 0.75rem 1.5rem;
            text-align: center;
        }

        .site-nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .site-nav a {
            color: #FAF3E0;
            text-decoration: none;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .site-nav a:hover {
            opacity: 0.8;
        }

        .site-nav .nav-active {
            font-weight: bold;
            border-bottom: 2px solid #C8902A;
            padding-bottom: 2px;
        }

        /* Hero Banner */
        .hero-banner {
            background-color: #7B2D42;
            color: #FAF3E0;
            text-align: center;
            padding: 3.5rem 1.5rem 3rem;
        }

        .hero-banner h1 {
            font-size: 2.4rem;
            margin-bottom: 0.5rem;
        }

        .hero-banner .subtitle {
            font-size: 1.2rem;
            font-style: italic;
            opacity: 0.9;
        }

        /* Main content */
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Form card */
        .form-card {
            background-color: #fff;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .form-card h2 {
            color: #7B2D42;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
        }

        .form-group .required {
            color: #a03030;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2A7B7B;
            box-shadow: 0 0 0 3px rgba(42, 123, 123, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group .char-count {
            font-size: 0.8rem;
            color: #888;
            text-align: right;
            margin-top: 0.25rem;
        }

        .error-msg {
            display: block;
            color: #a03030;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            min-height: 1rem;
        }

        /* Submit button */
        .btn-submit {
            display: block;
            width: 100%;
            background-color: #2A7B7B;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #1f6060;
        }

        /* Confirmation */
        .confirmation {
            background-color: #fff;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .confirmation h2 {
            color: #7B2D42;
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .confirmation .summary-item {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .confirmation .summary-label {
            font-weight: 600;
        }

        .confirmation .closing-msg {
            margin-top: 1.5rem;
            font-style: italic;
            color: #7B2D42;
            font-size: 1.05rem;
        }

        .btn-new-feedback {
            display: block;
            width: 100%;
            background-color: #C8902A;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1.5rem;
        }

        .btn-new-feedback:hover {
            background-color: #a87520;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #e0dcd3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-banner {
                padding: 2.5rem 1rem 2rem;
            }

            .hero-banner h1 {
                font-size: 1.6rem;
            }

            .hero-banner .subtitle {
                font-size: 1rem;
            }

            .site-nav ul {
                gap: 1rem;
            }

            .form-card,
            .confirmation {
                padding: 1.5rem;
            }
        }

        @media (max-width: 375px) {
            .hero-banner h1 {
                font-size: 1.4rem;
            }

            main {
                padding: 1.5rem 1rem;
            }

            .form-card,
            .confirmation {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="register.html">Registration</a></li>
            <li><a href="feedback.html" class="nav-active">Feedback</a></li>
            <li><a href="next-steps.html">Next Steps</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <header class="hero-banner">
        <h1>Share Your Feedback</h1>
        <p class="subtitle">Help us make our reunion the best it can be</p>
    </header>

    <main>
        <div class="form-card" id="form-section">
            <h2>Submit Feedback</h2>
            <form id="feedback-form" novalidate>
                <div class="form-group">
                    <label for="feedback-name">Name <span class="required">*</span></label>
                    <input type="text" id="feedback-name" name="name" required>
                    <span class="error-msg" id="error-name"></span>
                </div>

                <div class="form-group">
                    <label for="feedback-email">Email</label>
                    <input type="email" id="feedback-email" name="email">
                    <span class="error-msg" id="error-email"></span>
                </div>

                <div class="form-group">
                    <label for="feedback-category">Category <span class="required">*</span></label>
                    <select id="feedback-category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="Website Suggestion">Website Suggestion</option>
                        <option value="Event Idea">Event Idea</option>
                        <option value="General Comment">General Comment</option>
                        <option value="Future Reunion">Future Reunion</option>
                    </select>
                    <span class="error-msg" id="error-category"></span>
                </div>

                <div class="form-group">
                    <label for="feedback-message">Message <span class="required">*</span></label>
                    <textarea id="feedback-message" name="message" rows="5" placeholder="Share your suggestions, comments, or ideas (10–2000 characters)" required></textarea>
                    <div class="char-count" id="char-count">0 / 2000</div>
                    <span class="error-msg" id="error-message"></span>
                </div>

                <button type="submit" class="btn-submit">Submit Feedback</button>
            </form>
        </div>

        <div class="confirmation" id="confirmation-section" hidden>
            <h2>Feedback Submitted</h2>
            <div id="summary"></div>
            <p class="closing-msg">Thank you for helping us improve the reunion experience!</p>
            <button type="button" class="btn-new-feedback" id="btn-new-feedback">Submit Another</button>
        </div>
    </main>

    <footer>
        <p>Rowell Family Reunion 2026</p>
    </footer>

    <script>
        (function () {
            var STORAGE_KEY = 'rowellFeedback';
            var form = document.getElementById('feedback-form');
            var formSection = document.getElementById('form-section');
            var confirmationSection = document.getElementById('confirmation-section');
            var summaryDiv = document.getElementById('summary');
            var btnNewFeedback = document.getElementById('btn-new-feedback');
            var messageField = document.getElementById('feedback-message');
            var charCount = document.getElementById('char-count');

            function getErrorEl(field) {
                return document.getElementById('error-' + field);
            }

            function clearErrors() {
                var msgs = form.querySelectorAll('.error-msg');
                for (var i = 0; i < msgs.length; i++) {
                    msgs[i].textContent = '';
                }
            }

            function updateCharCount() {
                var len = messageField.value.length;
                charCount.textContent = len + ' / 2000';
            }

            messageField.addEventListener('input', updateCharCount);

            function validate() {
                clearErrors();
                var valid = true;
                var name = form.name.value.trim();
                var email = form.email.value.trim();
                var category = form.category.value;
                var message = form.message.value.trim();

                if (!name) {
                    getErrorEl('name').textContent = 'Name is required.';
                    valid = false;
                }
                if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    getErrorEl('email').textContent = 'Please enter a valid email address.';
                    valid = false;
                }
                if (!category) {
                    getErrorEl('category').textContent = 'Please select a category.';
                    valid = false;
                }
                if (!message) {
                    getErrorEl('message').textContent = 'Message is required.';
                    valid = false;
                } else if (message.length < 10) {
                    getErrorEl('message').textContent = 'Message must be at least 10 characters.';
                    valid = false;
                } else if (message.length > 2000) {
                    getErrorEl('message').textContent = 'Message must be 2000 characters or fewer.';
                    valid = false;
                }
                return valid;
            }

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
            }

            function getEntries() {
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        var parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) return parsed;
                    } catch (e) {
                        // ignore corrupt data
                    }
                }
                return [];
            }

            function saveEntry(entry) {
                var entries = getEntries();
                entries.push(entry);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
            }

            function showConfirmation(entry) {
                summaryDiv.textContent = '';

                var fields = [
                    { label: 'Name', value: entry.name },
                    { label: 'Email', value: entry.email || 'Not provided' },
                    { label: 'Category', value: entry.category },
                    { label: 'Message', value: entry.message },
                    { label: 'Submitted', value: new Date(entry.timestamp).toLocaleString() }
                ];

                for (var i = 0; i < fields.length; i++) {
                    var item = document.createElement('div');
                    item.className = 'summary-item';
                    var label = document.createElement('span');
                    label.className = 'summary-label';
                    label.textContent = fields[i].label + ': ';
                    var value = document.createElement('span');
                    value.textContent = fields[i].value;
                    item.appendChild(label);
                    item.appendChild(value);
                    summaryDiv.appendChild(item);
                }

                formSection.hidden = true;
                confirmationSection.hidden = false;
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                if (!validate()) return;

                var entry = {
                    id: generateId(),
                    name: form.name.value.trim(),
                    email: form.email.value.trim(),
                    category: form.category.value,
                    message: form.message.value.trim(),
                    timestamp: new Date().toISOString()
                };

                saveEntry(entry);
                showConfirmation(entry);
            });

            btnNewFeedback.addEventListener('click', function () {
                form.reset();
                updateCharCount();
                clearErrors();
                confirmationSection.hidden = true;
                formSection.hidden = false;
            });
        })();
    </script>
</body>
</html>
