<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchandise — Rowell Family Reunion</title>
    <style>
        /* Reset and base */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #2C2C2C;
            line-height: 1.6;
            background-color: #FAF3E0;
        }

        h1, h2, h3, h4 {
            font-family: Georgia, "Times New Roman", serif;
        }

        /* Navigation */
        .site-nav {
            background-color: #7B2D42;
            padding: 0.75rem 1.5rem;
            text-align: center;
        }

        .site-nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .site-nav a {
            color: #FAF3E0;
            text-decoration: none;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .site-nav a:hover {
            opacity: 0.8;
        }

        .site-nav .nav-active {
            font-weight: bold;
            border-bottom: 2px solid #C8902A;
            padding-bottom: 2px;
        }

        .site-nav .nav-disabled {
            color: #FAF3E0;
            opacity: 0.4;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 0.95rem;
            cursor: default;
        }

        /* Hero Banner */
        .hero-banner {
            background-color: #7B2D42;
            color: #FAF3E0;
            text-align: center;
            padding: 3.5rem 1.5rem 3rem;
        }

        .hero-banner h1 {
            font-size: 2.4rem;
            margin-bottom: 0.5rem;
        }

        .hero-banner .subtitle {
            font-size: 1.2rem;
            font-style: italic;
            opacity: 0.9;
        }

        /* Main content */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Category sections */
        .category-section {
            margin-bottom: 2.5rem;
        }

        .category-title {
            color: #7B2D42;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            padding-bottom: 0.35rem;
            border-bottom: 2px solid #C8902A;
        }

        /* Product cards */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .product-card {
            background-color: #fff;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
        }

        .product-card .product-name {
            color: #7B2D42;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .product-card .product-description {
            font-size: 0.9rem;
            color: #2C2C2C;
            opacity: 0.85;
            margin-bottom: 0.75rem;
            flex-grow: 1;
        }

        .product-card .product-price {
            font-size: 1.15rem;
            font-weight: bold;
            color: #C8902A;
            margin-bottom: 0.75rem;
        }

        .product-card .product-image-placeholder {
            background-color: #FAF3E0;
            border-radius: 6px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7B2D42;
            font-style: italic;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            border: 1px dashed #C8902A;
        }

        .btn-order {
            display: inline-block;
            background-color: #2A7B7B;
            color: #fff;
            border: none;
            padding: 0.55rem 1.3rem;
            border-radius: 5px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }

        .btn-order:hover {
            background-color: #1f6060;
        }

        /* Loading and error states */
        .loading-msg, .error-load {
            text-align: center;
            padding: 2rem;
            font-size: 1rem;
            color: #888;
        }

        .error-load {
            color: #a03030;
        }

        /* Order form */
        .order-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .order-overlay.active {
            display: flex;
        }

        .order-card {
            background-color: #fff;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .order-card h2 {
            color: #7B2D42;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
        }

        .order-card .selected-item {
            background-color: #FAF3E0;
            border-left: 4px solid #C8902A;
            border-radius: 5px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.95rem;
        }

        .order-card .selected-item .item-name {
            font-weight: 600;
        }

        .order-card .selected-item .item-price {
            color: #C8902A;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
        }

        .form-group .required {
            color: #a03030;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2A7B7B;
            box-shadow: 0 0 0 3px rgba(42, 123, 123, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .error-msg {
            display: block;
            color: #a03030;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            min-height: 1rem;
        }

        .btn-submit {
            display: block;
            width: 100%;
            background-color: #2A7B7B;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #1f6060;
        }

        .btn-cancel {
            display: block;
            width: 100%;
            background-color: transparent;
            color: #7B2D42;
            border: 1px solid #7B2D42;
            padding: 0.65rem 1.5rem;
            border-radius: 5px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.75rem;
        }

        .btn-cancel:hover {
            background-color: #FAF3E0;
        }

        /* Confirmation */
        .confirmation {
            background-color: #fff;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .confirmation h2 {
            color: #7B2D42;
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .confirmation .summary-item {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            text-align: left;
        }

        .confirmation .summary-label {
            font-weight: 600;
        }

        .confirmation .closing-msg {
            margin-top: 1.5rem;
            font-style: italic;
            color: #7B2D42;
            font-size: 1.05rem;
        }

        .btn-update {
            display: block;
            width: 100%;
            background-color: #C8902A;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1.5rem;
        }

        .btn-update:hover {
            background-color: #a87520;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #e0dcd3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-banner {
                padding: 2.5rem 1rem 2rem;
            }

            .hero-banner h1 {
                font-size: 1.6rem;
            }

            .hero-banner .subtitle {
                font-size: 1rem;
            }

            .site-nav ul {
                gap: 1rem;
            }

            .product-grid {
                grid-template-columns: 1fr;
            }

            .order-card {
                padding: 1.5rem;
            }
        }

        @media (max-width: 375px) {
            .hero-banner h1 {
                font-size: 1.4rem;
            }

            main {
                padding: 1.5rem 1rem;
            }

            .product-card {
                padding: 1rem;
            }

            .order-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="register-banquet.html">Registration</a></li>
            <li><a href="merchandise.html" class="nav-active">Merchandise</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </nav>

    <header class="hero-banner">
        <h1>Reunion Merchandise</h1>
        <p class="subtitle">Show your Rowell family pride</p>
    </header>

    <main>
        <div id="catalog">
            <p class="loading-msg">Loading merchandise...</p>
        </div>

        <div id="order-confirmation" class="confirmation" hidden>
            <h2>Request Submitted</h2>
            <div id="order-summary"></div>
            <p class="closing-msg">We will follow up with order details and payment instructions.</p>
            <button type="button" class="btn-update" id="btn-new-order">Browse More Items</button>
        </div>
    </main>

    <div class="order-overlay" id="order-overlay">
        <div class="order-card">
            <h2>Request This Item</h2>
            <div class="selected-item" id="order-item-display"></div>
            <form id="order-form" novalidate>
                <div class="form-group">
                    <label for="order-name">Full Name <span class="required">*</span></label>
                    <input type="text" id="order-name" name="fullName" required>
                    <span class="error-msg" id="error-fullName"></span>
                </div>

                <div class="form-group">
                    <label for="order-email">Email <span class="required">*</span></label>
                    <input type="email" id="order-email" name="email" required>
                    <span class="error-msg" id="error-email"></span>
                </div>

                <div class="form-group">
                    <label for="order-quantity">Quantity <span class="required">*</span></label>
                    <input type="number" id="order-quantity" name="quantity" min="1" value="1" required>
                    <span class="error-msg" id="error-quantity"></span>
                </div>

                <div class="form-group">
                    <label for="order-notes">Notes</label>
                    <textarea id="order-notes" name="notes" rows="3" placeholder="e.g. preferred size, color, or special requests"></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Request</button>
                <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
            </form>
        </div>
    </div>

    <footer>
        <p>Rowell Family Reunion 2026</p>
    </footer>

    <script>
        (function () {
            var STORAGE_KEY = 'rowellMerchOrder';
            var catalog = document.getElementById('catalog');
            var orderOverlay = document.getElementById('order-overlay');
            var orderItemDisplay = document.getElementById('order-item-display');
            var orderForm = document.getElementById('order-form');
            var btnCancel = document.getElementById('btn-cancel');
            var confirmationSection = document.getElementById('order-confirmation');
            var orderSummary = document.getElementById('order-summary');
            var btnNewOrder = document.getElementById('btn-new-order');
            var selectedProduct = null;
            var merchandiseData = [];

            function loadCatalog() {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'merchandise.json', true);
                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            merchandiseData = JSON.parse(xhr.responseText);
                            renderCatalog(merchandiseData);
                        } catch (e) {
                            showLoadError('Unable to read merchandise data.');
                        }
                    } else {
                        showLoadError('Unable to load merchandise.');
                    }
                };
                xhr.onerror = function () {
                    showLoadError('Unable to load merchandise.');
                };
                xhr.send();
            }

            function showLoadError(msg) {
                catalog.textContent = '';
                var p = document.createElement('p');
                p.className = 'error-load';
                p.textContent = msg;
                catalog.appendChild(p);
            }

            function renderCatalog(items) {
                catalog.textContent = '';

                var categories = {};
                for (var i = 0; i < items.length; i++) {
                    var cat = items[i].category;
                    if (!categories[cat]) categories[cat] = [];
                    categories[cat].push(items[i]);
                }

                var categoryNames = Object.keys(categories);
                for (var c = 0; c < categoryNames.length; c++) {
                    var catName = categoryNames[c];
                    var section = document.createElement('div');
                    section.className = 'category-section';

                    var title = document.createElement('h2');
                    title.className = 'category-title';
                    title.textContent = catName;
                    section.appendChild(title);

                    var grid = document.createElement('div');
                    grid.className = 'product-grid';

                    var products = categories[catName];
                    for (var p = 0; p < products.length; p++) {
                        grid.appendChild(createProductCard(products[p]));
                    }

                    section.appendChild(grid);
                    catalog.appendChild(section);
                }
            }

            function createProductCard(product) {
                var card = document.createElement('div');
                card.className = 'product-card';

                if (product.image) {
                    var img = document.createElement('img');
                    img.src = product.image;
                    img.alt = product.name;
                    img.style.width = '100%';
                    img.style.borderRadius = '6px';
                    img.style.marginBottom = '1rem';
                    card.appendChild(img);
                } else {
                    var placeholder = document.createElement('div');
                    placeholder.className = 'product-image-placeholder';
                    placeholder.textContent = 'Image coming soon';
                    card.appendChild(placeholder);
                }

                var name = document.createElement('h3');
                name.className = 'product-name';
                name.textContent = product.name;
                card.appendChild(name);

                var desc = document.createElement('p');
                desc.className = 'product-description';
                desc.textContent = product.description;
                card.appendChild(desc);

                var price = document.createElement('p');
                price.className = 'product-price';
                price.textContent = '$' + product.price.toFixed(2);
                card.appendChild(price);

                if (product.availability === 'available') {
                    var btn = document.createElement('button');
                    btn.className = 'btn-order';
                    btn.textContent = 'Request This Item';
                    btn.addEventListener('click', function () {
                        openOrderForm(product);
                    });
                    card.appendChild(btn);
                }

                return card;
            }

            function openOrderForm(product) {
                selectedProduct = product;

                orderItemDisplay.textContent = '';
                var nameSpan = document.createElement('span');
                nameSpan.className = 'item-name';
                nameSpan.textContent = product.name;
                var priceSpan = document.createElement('span');
                priceSpan.className = 'item-price';
                priceSpan.textContent = ' — $' + product.price.toFixed(2);
                orderItemDisplay.appendChild(nameSpan);
                orderItemDisplay.appendChild(priceSpan);

                // Prefill from last order if available
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        var data = JSON.parse(saved);
                        orderForm.fullName.value = data.fullName || '';
                        orderForm.email.value = data.email || '';
                    } catch (e) {
                        // ignore
                    }
                }

                orderForm.quantity.value = '1';
                orderForm.notes.value = '';
                clearErrors();
                orderOverlay.classList.add('active');
            }

            function closeOrderForm() {
                orderOverlay.classList.remove('active');
                selectedProduct = null;
            }

            function getErrorEl(field) {
                return document.getElementById('error-' + field);
            }

            function clearErrors() {
                var msgs = orderForm.querySelectorAll('.error-msg');
                for (var i = 0; i < msgs.length; i++) {
                    msgs[i].textContent = '';
                }
            }

            function validate() {
                clearErrors();
                var valid = true;
                var fullName = orderForm.fullName.value.trim();
                var email = orderForm.email.value.trim();
                var quantity = orderForm.quantity.value.trim();

                if (!fullName) {
                    getErrorEl('fullName').textContent = 'Full name is required.';
                    valid = false;
                }
                if (!email) {
                    getErrorEl('email').textContent = 'Email is required.';
                    valid = false;
                } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    getErrorEl('email').textContent = 'Please enter a valid email address.';
                    valid = false;
                }
                if (!quantity || parseInt(quantity, 10) < 1) {
                    getErrorEl('quantity').textContent = 'Quantity must be at least 1.';
                    valid = false;
                }
                return valid;
            }

            function showConfirmation(data) {
                orderSummary.textContent = '';

                var fields = [
                    { label: 'Name', value: data.fullName },
                    { label: 'Email', value: data.email },
                    { label: 'Item', value: data.itemName },
                    { label: 'Price', value: '$' + data.itemPrice },
                    { label: 'Quantity', value: data.quantity },
                    { label: 'Notes', value: data.notes || 'None' }
                ];

                for (var i = 0; i < fields.length; i++) {
                    var item = document.createElement('div');
                    item.className = 'summary-item';
                    var label = document.createElement('span');
                    label.className = 'summary-label';
                    label.textContent = fields[i].label + ': ';
                    var value = document.createElement('span');
                    value.textContent = fields[i].value;
                    item.appendChild(label);
                    item.appendChild(value);
                    orderSummary.appendChild(item);
                }

                catalog.hidden = true;
                confirmationSection.hidden = false;
            }

            // Form submit
            orderForm.addEventListener('submit', function (e) {
                e.preventDefault();
                if (!validate()) return;

                var data = {
                    fullName: orderForm.fullName.value.trim(),
                    email: orderForm.email.value.trim(),
                    itemId: selectedProduct.id,
                    itemName: selectedProduct.name,
                    itemPrice: selectedProduct.price.toFixed(2),
                    quantity: orderForm.quantity.value.trim(),
                    notes: orderForm.notes.value.trim()
                };

                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                closeOrderForm();
                showConfirmation(data);
            });

            // Cancel
            btnCancel.addEventListener('click', closeOrderForm);

            // Close overlay on background click
            orderOverlay.addEventListener('click', function (e) {
                if (e.target === orderOverlay) closeOrderForm();
            });

            // Browse more
            btnNewOrder.addEventListener('click', function () {
                confirmationSection.hidden = true;
                catalog.hidden = false;
            });

            // Check for saved order on load
            var savedOrder = localStorage.getItem(STORAGE_KEY);
            if (savedOrder) {
                try {
                    var orderData = JSON.parse(savedOrder);
                    if (orderData.itemName) {
                        showConfirmation(orderData);
                    }
                } catch (e) {
                    // ignore
                }
            }

            // Load catalog
            loadCatalog();
        })();
    </script>
</body>
</html>
